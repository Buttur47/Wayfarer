<!DOCTYPE html>
<html lang="en">

<head>

  <title>Wayfarer</title>
  <link rel="stylesheet" href="style.css">
</head>

<body style="background-color:hsl(208, 49%, 92%);">
  <script src="main.js">
  </script>
  <div class="background_img_div">
    <img id="background_img" src="images\pexels-errin-casano-2356045 1.png"/>
  </div>
  <div class="background_img_div_top">
    <div class="Wayfarer_div">
      <img id="logo" src="images\logo .svg">

      <img id="search_bar" src="images\search .svg">

      <p>Log In</p>
    </div>
